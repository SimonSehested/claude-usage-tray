<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>Claude Usage</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="glass-panel" id="panel">

    <div class="header">
      <div class="header-left">
        <svg class="claude-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8"/>
          <path d="M8 12 Q10 8 12 12 Q14 16 16 12" stroke="currentColor" stroke-width="1.8"
                fill="none" stroke-linecap="round"/>
        </svg>
        <span class="title">Claude Usage</span>
      </div>
      <button class="close-btn" id="closeBtn" title="Close">
        <svg width="8" height="8" viewBox="0 0 8 8">
          <line x1="1" y1="1" x2="7" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="7" y1="1" x2="1" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="header-sep"></div>

    <div id="content">
      <div class="loading-state">
        <div class="spinner"></div>
        <span>Fetching usage data…</span>
      </div>
    </div>

    <div class="footer" id="footer"></div>

  </div>
  <script src="renderer.js"></script>
</body>
</html>
